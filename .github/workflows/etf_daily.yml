name: ETF Daily Automation

on:
  schedule:
    - cron: "15 9 * * *"  # 2:45 PM IST
  workflow_dispatch:

jobs:
  run-etf-daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Setup credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDS }}" | base64 --decode > credentials.json

      - name: Run ETF historical
        run: python etf_historical.py

      - name: Run ETF signals
        run: python etf_signals.py
