name: Daily Portfolio Automation

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Setup credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDS }}" | base64 --decode > credentials.json

      - run: python historical_engine.py
      - run: python dip_signals_engine.py
      - run: python PORTFOLIO_ANALYSIS.py
